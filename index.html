

<!DOCTYPE html>
<html>

<head>
<title>Expense Tracker</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0b102f;
}

header {
    background-color: #1b24da;
    color: white;
    padding: 15px;
    text-align: center;
}

section{
    margin: 20px;
    padding: 20px;
    background-color: #fff;
    border-radius: 5px;

}

input {
    margin: 10px;
    padding: 10px;
    width: 100%;
    box-sizing: border-box;
}

button {
    padding: 10px 15px;
    background-color: #1b24da;
    color: white;
    border: none;
    cursor: pointer;
}

</style>

</head>

<body>

<header>
<h1>Expense Tracker</h1>
</header>

<main>
    <section>
        <h2>Add Expense</h2>
        
        <input type="text" placeholder="Enter expense name">
        <input type="number" placeholder="Enter amount" step="0.01">
        <button>Add Expense</button>
        
    </section>
</main>

<script>
console.log("Expense Tracker Loaded");
</script>

</body>
</html>
